name: Test project startup

on:
  push:
    branches: ['new-runner']

jobs:
  test:
    name: Build docker image
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Create .env file
      run: |
        touch .env
        echo POSTGRES_USER=postgres >> .env
        echo POSTGRES_PASSWORD=postgres >> .env
        echo POSTGRES_DB=mis >> .env
        echo MONGODB_TABLE=mis
        echo MONGODB_INIT_USERNAME=mongodb
        echo MONGODB_INIT_ROOT_PASSWORD=mongodb

    - name: Start with docker compose
      run: docker compose --profile production up -d
    
    - name: exec1
      run: docker exec -t mis-mongodb echo 'db.stats().ok' 
      
    - name: exec2
      run: docker exec -t mis-mongodb mongo localhost:27017/test --quiet
    
    - name: Dump docker logs
      uses: jwalton/gh-docker-logs@v1

